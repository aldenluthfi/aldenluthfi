name: Update Lines of Code in Readme

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 0 * * *" # Runs daily at midnight (UTC)
  workflow_dispatch: # Allows manual trigger

jobs:
  count-lines:
    runs-on: ubuntu-latest
    env:
      # Check cloc docs for supported languages and exact names (e.g., "Vuejs Component", "C#")
      # HIGHLIGHT_LANGS: show these languages individually; everything else goes to "Others"
      HIGHLIGHT_LANGS: "Assembly,C,C++,Go,Java,Python,Rust,Swift,TypeScript"

      # IGNORE_LANGS: drop these languages entirely (not shown and not counted).
      # Filters out build systems, config formats, templates, editor-generated
      # files, data formats (JSON/CSV/XML/YAML/TOML/Properties), docs (Markdown/TeX/Text),
      # graphics (SVG), and notebooks so "Others" reflects real source code only.
      IGNORE_LANGS: "HTML,SCSS,Vuejs Component,JavaScript,GDScript,Dart,CSS,Lua,Makefile,make,Gradle,CMake,Maven,Dockerfile,DOS Batch,Bourne Shell,Bourne Again Shell,PowerShell,Windows Resource File,INI,TOML,Properties,YAML,JSON,XML,CSV,Markdown,Text,SVG,Godot Scene,Godot Resource,Godot Shaders,FXML,EJS,Nunjucks,Mako,Protocol Buffers,TeX,Jupyter Notebook,Solidity,C/C++ Header,PHP,SQL,Haskell,Kotlin"

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      # Install required dependencies: jq (JSON processor), cloc (count lines of code), and locale settings
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq cloc locales
          sudo locale-gen en_US.UTF-8

      # Fetch public repositories (excluding forks) and clone only the default branch
      - name: Fetch and Clone Repositories
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          # Get a list of public repositories that are not forks
          REPOS=$(curl -H "Authorization: token $GH_PAT" -s "https://api.github.com/user/repos?per_page=100" | jq -r '.[] | select(.fork == false) | .full_name') || echo "Error fetching repositories"

          mkdir -p public-repos
          cd public-repos

          for REPO in $REPOS; do
            REPO_URL="https://github.com/$REPO.git"
            AUTHENTICATED_REPO=$(echo "$REPO_URL" | sed "s/https:\/\//https:\/\/$GH_PAT@/g")

            # Determine the default branch dynamically and clone only that branch
            DEFAULT_BRANCH=$(curl -H "Authorization: token $GH_PAT" -s "https://api.github.com/repos/$REPO" | jq -r '.default_branch')

            # echo "Cloning $REPO (default branch: $DEFAULT_BRANCH)..."
            git clone --quiet --branch "$DEFAULT_BRANCH" --single-branch "$AUTHENTICATED_REPO" "$(basename $REPO)-$DEFAULT_BRANCH" || echo "Failed to clone a repository"
          done

          # Run cloc to analyze lines of code, excluding non-source code files
          echo "Calculating lines of code..."
          mkdir -p ../output
          # Count LOC for all cloned repos; exclude languages via cloc's own --exclude-lang so totals match SUM
          # NOTE: This does NOT apply .gitignore automatically across multiple repos; for per-repo .gitignore, run cloc per folder
          cloc . --json --report-file=../output/cloc-output.json --exclude-lang="${IGNORE_LANGS}"

      # Commit and push the updated cloc-output.json and README.md to the current branch
      - name: Commit and Push Output
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          git config --global user.name "aldenluthfi [bot]"
          git config --global user.email "aldenluthfi@gmail.com"

          # Number formatting: enable thousands separators for all printf in this step
          # LC_ALL/LANG must be set before any printf that uses %'d

          # --- format helper ---
          format_number() {
            printf "%'d\n" "$1"
          }

          # Ensure grouping is enabled for every printf in this step
          export LC_ALL="en_US.UTF-8"
          export LANG="en_US.UTF-8"

          # Grab total from cloc
          TOTAL_LINES=$(jq '.SUM.code // 0' output/cloc-output.json)

          OTHER_LINES=0
          OTHER_COMMENT=0
          MAX_TOTAL=0

          # Parallel arrays preserve cloc's ordering for the second (render) pass.
          LANG_NAMES=()
          LANG_LINES=()
          LANG_COMMENT=()

          # Normalize the highlight list for exact, comma-bounded matching (no false partial matches).
          # Only strip spaces around commas — preserves spaces inside multi-word cloc categories like "Vuejs Component".
          HL=",$(echo "$HIGHLIGHT_LANGS" | sed 's/^ *//;s/ *$//;s/ *, */,/g'),"

          while read -r entry; do
            LANG=$(echo "$entry" | jq -r '.lang')
            LINES=$(echo "$entry" | jq -r '.lines')
            COMMENT=$(echo "$entry" | jq -r '.comment')

            if [[ "$HL" == *",$LANG,"* ]]; then
              LANG_NAMES+=("$LANG")
              LANG_LINES+=("$LINES")
              LANG_COMMENT+=("$COMMENT")
              TOTAL=$((LINES + COMMENT))
              if (( TOTAL > MAX_TOTAL )); then MAX_TOTAL=$TOTAL; fi
            else
              OTHER_LINES=$((OTHER_LINES + LINES))
              OTHER_COMMENT=$((OTHER_COMMENT + COMMENT))
            fi
          done < <(
            jq -c 'to_entries
              | map(select(.key != "header" and .key != "SUM"))
              | map({lang: .key, lines: .value.code, comment: .value.comment})
              | map(select(.lines > 0))
              | .[]' output/cloc-output.json
          )

          # "Others" includes all non-highlighted languages that cloc reported (after --exclude-lang); excluded ones never reach here
          if [[ $OTHER_LINES -gt 0 ]]; then
            LANG_NAMES+=("Others")
            LANG_LINES+=("$OTHER_LINES")
            LANG_COMMENT+=("$OTHER_COMMENT")
            TOTAL=$((OTHER_LINES + OTHER_COMMENT))
            if (( TOTAL > MAX_TOTAL )); then MAX_TOTAL=$TOTAL; fi
          fi

          # Render each row as: <name col>  <bar>  <right-aligned formatted code count>.
          # The bar is split into █ (code), ▓ (comments), and ░ (track), scaled
          # against MAX_TOTAL (max of code+comment across all rows). This means a
          # heavily-commented language reads as a longer total bar with a visible
          # ▓ segment past its █ portion.
          BAR_WIDTH=40
          FORMATTED_BREAKDOWN=""
          if (( MAX_TOTAL > 0 )); then
            for i in "${!LANG_NAMES[@]}"; do
              LANG="${LANG_NAMES[$i]}"
              LINES="${LANG_LINES[$i]}"
              COMMENT="${LANG_COMMENT[$i]}"
              TOTAL=$((LINES + COMMENT))
              CODE_CHARS=$(awk -v n="$LINES" -v m="$MAX_TOTAL" -v w="$BAR_WIDTH" 'BEGIN{ printf "%d", (n*w/m)+0.5 }')
              TOTAL_CHARS=$(awk -v n="$TOTAL" -v m="$MAX_TOTAL" -v w="$BAR_WIDTH" 'BEGIN{ printf "%d", (n*w/m)+0.5 }')
              COMMENT_CHARS=$((TOTAL_CHARS - CODE_CHARS))
              if (( COMMENT_CHARS < 0 )); then COMMENT_CHARS=0; fi
              BAR=$(awk -v c="$CODE_CHARS" -v m="$COMMENT_CHARS" -v w="$BAR_WIDTH" 'BEGIN{
                for(i=0;i<c;i++) printf "█";
                for(i=0;i<m;i++) printf "▓";
                for(i=c+m;i<w;i++) printf "░";
              }')
              FORMATTED=$(format_number "$LINES")
              FORMATTED_BREAKDOWN+=$(printf "%-15s %s   %9s" "$LANG" "$BAR" "$FORMATTED")$'\n'
            done
          fi

          # Format total ONCE (do not overwrite later)
          FORMATTED_TOTAL=$(format_number "$TOTAL_LINES")

          # Only the dynamic part is regenerated. The "[ LANGUAGES BREAKDOWN ]"
          # header (above) and the closing code fence (below) act as natural
          # sentinels, so static content (e.g. the [ ABOUT ] section) stays
          # untouched in README.md.
          CODE_BLOCK="
          Legend: █ code   ▓ comments   ░ unfilled

          $FORMATTED_BREAKDOWN
          [ TOTAL LINES OF CODE: $FORMATTED_TOTAL ]"

          echo "$CODE_BLOCK" > temp_block.txt
          sed -i '/\[ LANGUAGES BREAKDOWN \]/,/```/{
              //!d
              /\[ LANGUAGES BREAKDOWN \]/r temp_block.txt
          }' README.md

          rm temp_block.txt

          git add output/cloc-output.json README.md
          git commit -m "chore: update README and cloc-output.json with latest code stats" || echo "No changes to commit"
          git push origin HEAD
